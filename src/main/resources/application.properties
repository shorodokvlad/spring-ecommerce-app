spring.application.name=Ecommerce
server.port=2424

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase free-tier session pooler allows 15 client connections total.
# Keep each running instance small so local + deployed stay under the cap.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update

secreteJwtString=${JWT_SECRET}

aws.s3.access=${AWS_S3_ACCESS_KEY}
aws.s3.secrete=${AWS_S3_SECRET_KEY}

# Mail (Gmail SMTP with an app password, or any other SMTP provider)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Used to build password-reset links sent by email
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Google Sign-In (OAuth client ID from Google Cloud Console)
app.google.client-id=${GOOGLE_CLIENT_ID:647751861146-ujt60ari506ptp23hcc04kans0n8kmif.apps.googleusercontent.com}