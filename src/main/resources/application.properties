spring.application.name=Ecommerce
server.port=2424

spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase free-tier session pooler allows 15 client connections total.
# Keep each running instance small so local + deployed stay under the cap.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update

secreteJwtString=${JWT_SECRET}

aws.s3.access=${AWS_S3_ACCESS_KEY}
aws.s3.secrete=${AWS_S3_SECRET_KEY}