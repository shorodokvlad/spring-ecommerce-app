apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-backend
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    # Replace with your real domain (or nip.io hostname for demos,
    # e.g. api.<cluster-ip>.nip.io)
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ecommerce-backend
                port:
                  number: 80
