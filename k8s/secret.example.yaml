# Template only — copy to secret.yaml (gitignored), fill in real values,
# then: kubectl apply -f k8s/secret.yaml
#
# Or create it directly without a file:
#   kubectl create secret generic ecommerce-secrets \
#     --from-literal=SUPABASE_DB_URL='jdbc:postgresql://...' \
#     --from-literal=SUPABASE_DB_USER='postgres.xxxx' \
#     --from-literal=SUPABASE_DB_PASSWORD='...' \
#     --from-literal=JWT_SECRET='...' \
#     --from-literal=AWS_S3_ACCESS_KEY='...' \
#     --from-literal=AWS_S3_SECRET_KEY='...'
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
type: Opaque
stringData:
  SUPABASE_DB_URL: jdbc:postgresql://aws-0-REGION.pooler.supabase.com:5432/postgres
  SUPABASE_DB_USER: postgres.YOUR_PROJECT_REF
  SUPABASE_DB_PASSWORD: YOUR_DB_PASSWORD
  JWT_SECRET: CHANGE_ME
  # These names must match the ${...} placeholders in application.properties
  AWS_S3_ACCESS_KEY: YOUR_KEY
  AWS_S3_SECRET_KEY: YOUR_SECRET
